name: quran_tutor_app
description: Quran memorization tutoring application with admin, teacher, and student roles

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.10

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Localization
  easy_localization: ^3.0.3
  intl: ^0.18.1

  # Forms & Validation
  formz: ^0.6.1
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^9.1.0

  # Calendar & Scheduling
  table_calendar: ^3.0.9

  # Charts & Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # PDF Generation
  pdf: ^3.10.4
  printing: ^5.11.1
  path_provider: ^2.1.1

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Connectivity & Network
  connectivity_plus: ^5.0.2
  internet_connection_checker: ^1.0.0+1

  # Images & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # UI Components
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  pull_to_refresh_flutter3: ^2.0.2
  flutter_staggered_animations: ^1.1.1

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.2
  share_plus: ^7.2.2
  url_launcher: ^6.2.2

  # Audio (for Tajweed features)
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  record: ^5.0.4

  # Date/Time
  jiffy: ^6.2.1

  # State Persistence
  hydrated_bloc: ^9.1.3
  path_provider: ^2.1.2

  # Supabase
  supabase_flutter: ^2.3.4

  # Freezed
  freezed_annotation: ^2.4.1

dependency_overrides:
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Testing
  mocktail: ^1.0.2
  bloc_test: ^9.1.6
  mockito: ^5.4.4

  # Code Generation
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  freezed: ^2.4.6

  # Linting
  flutter_lints: ^3.0.1
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/lang/
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/quran/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/Scheherazade-Regular.ttf
        - asset: assets/fonts/Scheherazade-Bold.ttf
          weight: 700
