name: quran_tutor_app
description: Quran memorization tutoring application with admin, teacher, and student roles

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.2.2

  # Supabase (replaces Firebase)
  supabase_flutter: ^2.9.0

  # Push Notifications (replaces firebase_messaging)
  onesignal_flutter: ^5.2.5

  # Analytics (optional, lightweight)
  posthog_flutter: ^5.24.0

  # Local Storage
  flutter_secure_storage: ^10.0.0

  # Offline Support (SQLite ORM)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # HTTP & API
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # Localization
  easy_localization: ^3.0.3
  intl: ^0.20.2

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Calendar & Scheduling
  table_calendar: ^3.0.9

  # Charts & Visualization
  fl_chart: ^1.2.0

  # PDF Generation
  pdf: ^3.10.4
  printing: ^5.11.1

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Connectivity & Network
  connectivity_plus: ^6.1.5
  internet_connection_checker: ^3.0.1

  # Images & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # UI Components
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.3
  pull_to_refresh_flutter3: ^2.0.2
  flutter_staggered_animations: ^1.1.1

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  share_plus: ^12.0.2
  url_launcher: ^6.2.2

  # Audio (for Tajweed features)
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  record: ^6.2.0

  # State Persistence
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.2

  # Runtime env loading (.env file)
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  injectable_generator: ^3.0.2

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
  - assets/lang/
  - assets/images/
  - assets/icons/
  - assets/fonts/
  - assets/quran/
  - .env
